<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IR Tools Portal｜アイアール株式会社</title>
    <style>
        :root {
            --ir-red: #e01b24;
            --ir-red-dark: #b01219;
            --ir-red-light: #ff4d55;
            --ir-red-glow: rgba(224,27,36,0.15);
            --bg: #0d0d0d;
            --bg2: #141414;
            --bg3: #1c1c1c;
            --card: #1a1a1a;
            --card-hover: #222;
            --border: #272727;
            --border-light: #333;
            --text: #f5f5f5;
            --text-sub: #999;
            --text-muted: #555;
            --sidebar-w: 220px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: -apple-system, 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ===== LAYOUT ===== */
        .app-layout { display: flex; min-height: 100vh; }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            background: var(--bg2);
            border-right: 1px solid var(--border);
            position: fixed;
            top: 0; left: 0; bottom: 0;
            overflow-y: auto;
            z-index: 50;
            display: flex;
            flex-direction: column;
        }
        .sidebar-logo {
            padding: 20px 18px 16px;
            display: flex; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .logo-mark {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--ir-red), var(--ir-red-dark));
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 900; color: #fff;
            flex-shrink: 0;
            box-shadow: 0 2px 10px var(--ir-red-glow);
        }
        .logo-texts .t1 { font-size: 0.9rem; font-weight: 800; }
        .logo-texts .t2 { font-size: 0.65rem; color: var(--text-sub); }
        .sidebar-search {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .search-wrap { position: relative; }
        .search-wrap::before {
            content: '🔍';
            position: absolute; left: 8px; top: 50%;
            transform: translateY(-50%);
            font-size: 0.72rem; pointer-events: none;
        }
        .sidebar-search input {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 8px 12px 8px 30px;
            font-size: 0.82rem;
            color: var(--text);
        }
        .sidebar-search input::placeholder { color: var(--text-muted); }
        .sidebar-search input:focus { outline: none; border-color: var(--ir-red); }
        .sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0 20px; }
        .nav-section-label {
            padding: 10px 18px 4px;
            font-size: 0.68rem; font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.8px; text-transform: uppercase;
        }
        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 18px;
            cursor: pointer;
            font-size: 0.85rem; color: var(--text-sub);
            position: relative;
            transition: background 0.15s;
            white-space: nowrap;
            overflow: hidden;
        }
        .nav-item:hover { background: var(--bg3); color: var(--text); }
        .nav-item.active {
            background: var(--ir-red-glow);
            color: var(--ir-red-light); font-weight: 600;
        }
        .nav-item.active::before {
            content: '';
            position: absolute; left: 0; top: 20%; bottom: 20%;
            width: 3px; background: var(--ir-red);
            border-radius: 0 2px 2px 0;
        }
        .nav-item .nav-icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
        .nav-item span:nth-child(2) { overflow: hidden; text-overflow: ellipsis; }
        .nav-count {
            margin-left: auto;
            background: var(--bg3); border: 1px solid var(--border-light);
            font-size: 0.65rem; color: var(--text-muted);
            padding: 1px 6px; border-radius: 10px;
            flex-shrink: 0;
        }
        .nav-item.active .nav-count {
            background: var(--ir-red-glow);
            border-color: rgba(224,27,36,0.3);
            color: var(--ir-red-light);
        }
        .nav-sub-item { padding-left: 46px; font-size: 0.8rem; }

        /* ===== MAIN ===== */
        .main-area {
            margin-left: var(--sidebar-w);
            width: calc(100% - var(--sidebar-w));
            min-width: 0;
            display: flex;
            flex-direction: column;
        }
        .main-header {
            background: rgba(13,13,13,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            height: 52px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 40;
            flex-shrink: 0;
        }
        .main-header-title { font-size: 1rem; font-weight: 700; }
        .header-badge {
            background: var(--ir-red-glow);
            border: 1px solid rgba(224,27,36,0.3);
            color: var(--ir-red-light);
            font-size: 0.72rem; font-weight: 700;
            padding: 4px 10px; border-radius: 20px;
            flex-shrink: 0;
        }

        /* ===== NEWS TICKER ===== */
        .news-ticker {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            height: 36px;
            display: flex; align-items: center;
            flex-shrink: 0;
            overflow: hidden;
        }
        .ticker-label {
            background: var(--ir-red);
            color: #fff;
            font-size: 0.65rem; font-weight: 800;
            padding: 0 12px;
            height: 100%;
            display: flex; align-items: center;
            letter-spacing: 0.5px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .ticker-track-wrap {
            flex: 1; overflow: hidden;
            position: relative;
        }
        .ticker-track {
            display: flex; align-items: center;
            animation: tickerScroll 30s linear infinite;
            white-space: nowrap;
        }
        .ticker-track:hover { animation-play-state: paused; }
        .ticker-item {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 0 32px 0 0;
            font-size: 0.78rem; color: var(--text-sub);
            cursor: pointer;
            transition: color 0.15s;
        }
        .ticker-item:hover { color: var(--text); }
        .ticker-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .ticker-date { color: var(--text-muted); font-size: 0.72rem; }
        @keyframes tickerScroll {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* ===== PAGE CONTENT ===== */
        .page-content { padding: 28px; flex: 1; }

        /* ===== HERO BANNER ===== */
        .hero-banner-row {
            display: grid;
            grid-template-columns: 3fr 2fr;
            grid-template-rows: 260px;
            gap: 16px;
            margin-bottom: 36px;
        }
        .hero-banner {
            border-radius: 18px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 24px;
            transition: transform 0.2s, box-shadow 0.2s;
            /* 重要：writing-modeを明示的に横書きに固定 */
            writing-mode: horizontal-tb;
            text-orientation: mixed;
        }
        .hero-banner:hover { transform: scale(1.01); box-shadow: 0 12px 40px rgba(0,0,0,0.6); }
        .hero-banner-bg {
            position: absolute; inset: 0; z-index: 0;
            overflow: hidden;
        }
        .hero-banner-bg-emoji {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 7rem; opacity: 0.15;
            /* 絵文字が縦並びにならないよう固定 */
            writing-mode: horizontal-tb;
        }
        .hero-banner-overlay {
            position: absolute; inset: 0; z-index: 1;
            background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.05) 60%);
        }
        .hero-banner-content {
            position: relative; z-index: 2;
            writing-mode: horizontal-tb;
        }
        .hero-eyebrow {
            font-size: 0.72rem; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            margin-bottom: 8px; opacity: 0.9;
            display: block;
        }
        .hero-banner-title {
            font-size: 1.5rem; font-weight: 800; line-height: 1.25;
            margin-bottom: 6px;
            display: block;
            word-break: keep-all;
        }
        .hero-banner-sub {
            font-size: 0.82rem; color: rgba(255,255,255,0.75);
            display: block;
            word-break: break-all;
        }

        /* サブバナー */
        .sub-banners {
            display: flex; flex-direction: column; gap: 16px;
            overflow: hidden;
        }
        .sub-banner {
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            flex: 1;
            display: flex; align-items: flex-end; padding: 14px;
            transition: transform 0.2s;
            writing-mode: horizontal-tb;
        }
        .sub-banner:hover { transform: scale(1.02); }
        .sub-banner-bg {
            position: absolute; inset: 0; z-index: 0; overflow: hidden;
        }
        .sub-banner-bg-emoji {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 4rem; opacity: 0.18;
            writing-mode: horizontal-tb;
        }
        .sub-banner-overlay {
            position: absolute; inset: 0; z-index: 1;
            background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, transparent 70%);
        }
        .sub-banner-content {
            position: relative; z-index: 2;
            writing-mode: horizontal-tb;
        }
        .sub-banner-label {
            font-size: 0.68rem; font-weight: 700;
            letter-spacing: 0.5px; opacity: 0.85;
            margin-bottom: 3px; display: block;
        }
        .sub-banner-title {
            font-size: 0.95rem; font-weight: 800;
            display: block; word-break: keep-all;
        }

        /* ===== SECTION ===== */
        .section-row {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 14px;
        }
        .section-h {
            font-size: 1.1rem; font-weight: 800;
            display: flex; align-items: center; gap: 8px;
        }
        .section-count {
            font-size: 0.72rem; font-weight: 600; color: var(--text-muted);
            background: var(--bg3); border: 1px solid var(--border);
            padding: 2px 8px; border-radius: 10px;
        }
        .see-all { font-size: 0.8rem; color: var(--ir-red-light); cursor: pointer; font-weight: 600; }
        .see-all:hover { text-decoration: underline; }

        /* ===== SHELF ===== */
        .shelf-wrap { margin-bottom: 36px; }
        .shelf {
            display: flex; gap: 14px;
            overflow-x: auto; padding-bottom: 8px;
            scroll-snap-type: x mandatory;
        }
        .shelf::-webkit-scrollbar { height: 4px; }
        .shelf::-webkit-scrollbar-track { background: transparent; }
        .shelf::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

        /* ===== SHELF TOOL CARD ===== */
        .shelf-tool-card {
            flex-shrink: 0; width: 200px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; padding: 16px;
            cursor: pointer; scroll-snap-align: start;
            transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
            display: flex; flex-direction: column; gap: 10px;
        }
        .shelf-tool-card:hover {
            background: var(--card-hover); border-color: var(--border-light);
            transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,0.5);
        }
        .shelf-tool-icon {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
            flex-shrink: 0;
        }
        .shelf-tool-name { font-size: 0.88rem; font-weight: 700; line-height: 1.3; }
        .shelf-tool-desc { font-size: 0.75rem; color: var(--text-sub); line-height: 1.5; flex: 1; }
        .shelf-tool-footer { display: flex; align-items: center; justify-content: space-between; }
        .tool-tag { font-size: 0.65rem; font-weight: 700; padding: 2px 7px; border-radius: 6px; }
        .tag-calc  { background: rgba(34,197,94,0.12);  color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }
        .tag-doc   { background: rgba(56,189,248,0.12); color: #38bdf8; border: 1px solid rgba(56,189,248,0.2); }
        .tag-study { background: rgba(245,158,11,0.12); color: #f59e0b; border: 1px solid rgba(245,158,11,0.2); }
        .tag-soon  { background: rgba(148,163,184,0.1); color: #64748b; border: 1px solid rgba(148,163,184,0.15); }
        .open-btn {
            width: 26px; height: 26px; background: var(--bg3);
            border-radius: 7px; display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; color: var(--text-sub);
            transition: background 0.15s, color 0.15s;
            flex-shrink: 0;
        }
        .shelf-tool-card:hover .open-btn { background: var(--ir-red); color: #fff; }

        /* ===== NEWS SHELF CARD ===== */
        .shelf-news-card {
            flex-shrink: 0; width: 260px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; padding: 16px;
            cursor: pointer; scroll-snap-align: start;
            transition: background 0.15s, transform 0.15s;
            display: flex; flex-direction: column; gap: 8px;
        }
        .shelf-news-card:hover { background: var(--card-hover); border-color: var(--border-light); transform: translateY(-2px); }
        .news-card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .news-type-badge { font-size: 0.65rem; font-weight: 700; padding: 2px 7px; border-radius: 6px; flex-shrink: 0; }
        .news-type-release { background: rgba(34,197,94,0.12);  color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }
        .news-type-update  { background: rgba(56,189,248,0.12); color: #38bdf8; border: 1px solid rgba(56,189,248,0.2); }
        .news-type-fix     { background: rgba(245,158,11,0.12); color: #f59e0b; border: 1px solid rgba(245,158,11,0.2); }
        .news-type-info    { background: rgba(148,163,184,0.1); color: #94a3b8; border: 1px solid rgba(148,163,184,0.15); }
        .news-card-date  { font-size: 0.7rem; color: var(--text-muted); }
        .news-card-title { font-size: 0.9rem; font-weight: 700; line-height: 1.3; }
        .news-card-body  { font-size: 0.77rem; color: var(--text-sub); line-height: 1.5; flex: 1; }

        /* ===== GRID TOOL CARD ===== */
        .tool-grid-section { margin-bottom: 36px; }
        .tool-grid-2col {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px;
        }
        .grid-tool-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; padding: 18px;
            cursor: pointer; display: flex; gap: 14px; align-items: flex-start;
            transition: background 0.15s, border-color 0.15s, transform 0.15s;
        }
        .grid-tool-card:hover {
            background: var(--card-hover); border-color: var(--border-light); transform: translateY(-2px);
        }
        .grid-tool-icon {
            width: 48px; height: 48px; flex-shrink: 0;
            border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
        }
        .grid-tool-body { flex: 1; min-width: 0; }
        .grid-tool-name { font-size: 0.92rem; font-weight: 700; margin-bottom: 4px; }
        .grid-tool-desc { font-size: 0.78rem; color: var(--text-sub); line-height: 1.5; }
        .grid-tool-tag  { margin-top: 8px; display: inline-block; }

        /* ===== NEWS LIST PAGE ===== */
        .news-list { display: flex; flex-direction: column; gap: 12px; }
        .news-list-item {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 16px 18px;
            display: flex; gap: 14px; align-items: flex-start;
            transition: background 0.15s, border-color 0.15s;
        }
        .news-list-item:hover { background: var(--card-hover); border-color: var(--border-light); }
        .news-list-body { flex: 1; min-width: 0; }
        .news-list-title { font-size: 0.92rem; font-weight: 700; margin-bottom: 4px; }
        .news-list-desc  { font-size: 0.78rem; color: var(--text-sub); line-height: 1.5; }
        .news-list-meta  { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; min-width: 90px; }
        .news-list-date  { font-size: 0.72rem; color: var(--text-muted); }

        /* ===== DIVIDER ===== */
        .divider { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            z-index: 200;
            display: flex; align-items: center; justify-content: center; padding: 20px;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: all; }
        .modal {
            background: var(--bg2); border: 1px solid var(--border-light);
            border-radius: 20px; width: 100%; max-width: 440px; padding: 28px;
            transform: translateY(20px); transition: transform 0.2s;
            max-height: 90vh; overflow-y: auto;
        }
        .modal-overlay.open .modal { transform: translateY(0); }
        .modal-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .modal-icon-wrap {
            width: 64px; height: 64px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; margin: 0 auto 16px;
        }
        .modal-name { font-size: 1.1rem; font-weight: 800; text-align: center; margin-bottom: 8px; }
        .modal-desc { font-size: 0.87rem; color: var(--text-sub); text-align: center; line-height: 1.7; margin-bottom: 24px; }
        .modal-close {
            background: var(--bg3); border: none;
            width: 32px; height: 32px; border-radius: 8px;
            color: var(--text-sub); font-size: 1rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .modal-close:hover { background: var(--ir-red); color: #fff; }
        .modal-open-btn {
            display: block; width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--ir-red), var(--ir-red-dark));
            border: none; border-radius: 12px;
            color: #fff; font-size: 0.95rem; font-weight: 700;
            cursor: pointer; text-align: center; text-decoration: none;
            box-shadow: 0 4px 20px var(--ir-red-glow);
            transition: opacity 0.15s, transform 0.15s;
        }
        .modal-open-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .modal-open-btn.disabled { opacity: 0.4; pointer-events: none; }

        /* ===== FOOTER ===== */
        .site-footer {
            background: var(--bg2); border-top: 1px solid var(--border);
            padding: 18px 28px;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 8px;
            flex-shrink: 0;
        }
        .footer-logo { display: flex; align-items: center; gap: 8px; }
        .footer-logo-mark {
            width: 26px; height: 26px;
            background: linear-gradient(135deg, var(--ir-red), var(--ir-red-dark));
            border-radius: 7px; display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem; font-weight: 900; color: #fff;
        }
        .footer-text { font-size: 0.75rem; color: var(--text-muted); }

        /* ===== MOBILE ===== */
        .mobile-bar {
            display: none;
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 60;
            background: rgba(20,20,20,0.97);
            backdrop-filter: blur(14px);
            border-top: 1px solid var(--border);
            padding: 8px 0 max(8px, env(safe-area-inset-bottom));
        }
        .mobile-bar-inner { display: flex; justify-content: space-around; }
        .mobile-tab {
            display: flex; flex-direction: column; align-items: center;
            gap: 3px; padding: 4px 10px;
            font-size: 0.6rem; color: var(--text-muted);
            cursor: pointer; transition: color 0.15s;
        }
        .mobile-tab .mt-icon { font-size: 1.2rem; }
        .mobile-tab.active { color: var(--ir-red-light); }

        @media (max-width: 700px) {
            .sidebar { display: none; }
            .main-area { margin-left: 0; width: 100%; }
            .mobile-bar { display: block; }
            .page-content { padding: 16px 16px 80px; }
            .main-header { padding: 0 16px; }
            .hero-banner-row { grid-template-columns: 1fr; grid-template-rows: auto; }
            .hero-banner { min-height: 200px; }
            .sub-banners { flex-direction: row; }
            .sub-banner { min-height: 120px; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.3s ease forwards; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
    </style>

<body>
<div class="app-layout">

    <!-- SIDEBAR -->

/* ===== ユーティリティ ===== */

    'general':      ['general-doc','general-calc','general-convert','general-comm'],
    'construction': ['const-electrical','const-mechanical','const-civil','const-architecture','const-landscaping','const-machinery','const-telecom','const-safety','const-process'],
    'study':        ['study-license','study-knowledge','study-plan']
};
function getToolsByCategory(id) {
    return PARENT_MAP[id] ? TOOLS.filter(t => PARENT_MAP[id].includes(t.category)) : TOOLS.filter(t => t.category === id);
}
function getToolCount(id) { return getToolsByCategory(id).length; }
function getFeatured()    { return TOOLS.filter(t => t.featured); }
function getAllNavItems()  { return NAV_STRUCTURE.flatMap(g => g.items); }
function tagHtml(tag, label) {
    const cls = {calc:'tag-calc',doc:'tag-doc',study:'tag-study',soon:'tag-soon'}[tag]||'tag-soon';
    return `<span class="tool-tag ${cls}">${label}</span>`;
}
function newsTypeCls(type) {
    return {release:'news-type-release',update:'news-type-update',fix:'news-type-fix',info:'news-type-info'}[type]||'news-type-info';
}

/* ===== ティッカー ===== */
function buildTicker() {
    const items = NEWS.slice(0,3).map(n =>
        `<span class="ticker-item" onclick="navigateTo('news')">
            <span class="ticker-dot" style="background:${n.color}"></span>
            <span class="ticker-date">${n.date}</span>
            <span>${n.title}</span>
        </span>`
    ).join('');
    document.getElementById('tickerTrack').innerHTML = items + items;
}

/* ===== サイドバー ===== */
function buildSidebar() {
    let html = '';
    NAV_STRUCTURE.forEach(group => {
        if (group.label) html += `<div class="nav-section-label">${group.label}</div>`;
        group.items.forEach(item => {
            const count  = item.id==='today' ? TOOLS.length : item.id==='news' ? NEWS.length : getToolCount(item.id);
            const active = State.currentPage===item.id ? 'active' : '';
            const sub    = item.sub ? 'nav-sub-item' : '';
            html += `<div class="nav-item ${active} ${sub}" onclick="navigateTo('${item.id}')">
                <span class="nav-icon">${item.icon}</span>
                <span>${item.name}</span>
                <span class="nav-count">${count}</span>
            </div>`;
        });
    });
    document.getElementById('sidebarNav').innerHTML = html;
}

/* ===== ナビゲーション ===== */
function navigateTo(pageId) {
    State.currentPage = pageId;
    State.searchQuery = '';
    document.getElementById('sideSearch').value = '';
    buildSidebar();
    renderPage();
    const topId = ['today','news','general','construction','study'].includes(pageId) ? pageId
        : pageId.startsWith('general')   ? 'general'
        : pageId.startsWith('const')     ? 'construction'
        : pageId.startsWith('study')     ? 'study' : 'today';
    document.querySelectorAll('.mobile-tab').forEach((t,i) => {
        t.classList.toggle('active', ['today','general','construction','study','news'][i]===topId);
    });
}

function renderPage() {
    const navItem = getAllNavItems().find(i => i.id===State.currentPage);
    document.getElementById('mainHeaderTitle').textContent =
        State.currentPage==='today' ? 'Today' : navItem ? `${navItem.icon} ${navItem.name}` : '';
    const html = State.currentPage==='today'        ? renderToday()
               : State.currentPage==='news'         ? renderNewsPage()
               : renderCategoryPage(State.currentPage);
    document.getElementById('pageContent').innerHTML = html;
}

/* ===== Today ===== */
function renderToday() {
    const featured    = getFeatured();
    const mainFeat    = featured[0];
    const subFeats    = featured.slice(1,3);
    const recentTools = TOOLS.filter(t => t.date!=='近日公開').slice(0,8);
    const comingSoon  = TOOLS.filter(t => t.date==='近日公開').slice(0,8);

    const mainBannerHtml = mainFeat ? `
        <div class="hero-banner" onclick="openModal('${mainFeat.id}')">
            <div class="hero-banner-bg" style="background:${mainFeat.featuredBg||'var(--bg3)'}">
                <div class="hero-banner-bg-emoji">${mainFeat.icon}</div>
            </div>
            <div class="hero-banner-overlay"></div>
            <div class="hero-banner-content">
                <span class="hero-eyebrow" style="color:${mainFeat.featuredColor||'#fff'}">${mainFeat.featuredLabel||''}</span>
                <span class="hero-banner-title">${mainFeat.name}</span>
                <span class="hero-banner-sub">${mainFeat.desc.slice(0,44)}…</span>
            </div>
        </div>` : '';

    const subBannersHtml = `
        <div class="sub-banners">
            ${subFeats.map(t => `
            <div class="sub-banner" onclick="openModal('${t.id}')">
                <div class="sub-banner-bg" style="background:${t.featuredBg||'var(--bg3)'}">
                    <div class="sub-banner-bg-emoji">${t.icon}</div>
                </div>
                <div class="sub-banner-overlay"></div>
                <div class="sub-banner-content">
                    <span class="sub-banner-label" style="color:${t.featuredColor||'#fff'}">${t.featuredLabel||''}</span>
                    <span class="sub-banner-title">${t.name}</span>
                </div>
            </div>`).join('')}
        </div>`;

    return `<div class="fade-up">
        <div class="hero-banner-row">${mainBannerHtml}${subBannersHtml}</div>

        <div class="shelf-wrap">
            <div class="section-row">
                <div class="section-h">📢 最新のお知らせ <span class="section-count">${NEWS.length} 件</span></div>
                <span class="see-all" onclick="navigateTo('news')">すべて見る</span>
            </div>
            <div class="shelf">
                ${NEWS.slice(0,5).map(n => `
                <div class="shelf-news-card" onclick="navigateTo('news')">
                    <div class="news-card-top">
                        <span class="news-type-badge ${newsTypeCls(n.type)}">${n.typeLabel}</span>
                        <span class="news-card-date">${n.date}</span>
                    </div>
                    <div class="news-card-title">${n.title}</div>
                    <div class="news-card-body">${n.body.slice(0,60)}…</div>
                </div>`).join('')}
            </div>
        </div>

        <div class="shelf-wrap">
            <div class="section-row">
                <div class="section-h">🛠️ 使えるツール <span class="section-count">${recentTools.length} 件</span></div>
                <span class="see-all" onclick="navigateTo('construction')">すべて見る</span>
            </div>
            <div class="shelf">${recentTools.map(t => shelfCard(t)).join('')}</div>
        </div>

        <div class="shelf-wrap">
            <div class="section-row">
                <div class="section-h">🔜 近日公開 <span class="section-count">${comingSoon.length} 件</span></div>
            </div>
            <div class="shelf">${comingSoon.map(t => shelfCard(t)).join('')}</div>
        </div>

        <hr class="divider">
        <div class="section-row"><div class="section-h">📁 カテゴリから探す</div></div>
        <div class="tool-grid-2col" style="margin-bottom:32px;">
            ${[
                {id:'general',      icon:'💼', name:'業務一般',  desc:'書類・計算・変換など全分野共通のツール',                      bg:'rgba(56,189,248,0.08)',  border:'rgba(56,189,248,0.15)'},
                {id:'construction', icon:'🏗️', name:'施工管理',  desc:'電気・設備・土木・建築・造園・機械・通信・安全・工程管理',    bg:'rgba(245,158,11,0.08)',  border:'rgba(245,158,11,0.15)'},
                {id:'study',        icon:'📚', name:'学習支援',  desc:'資格対策・法規参照・学習プランナー',                          bg:'rgba(224,27,36,0.08)',   border:'rgba(224,27,36,0.15)'}
            ].map(cat => `
            <div class="grid-tool-card" onclick="navigateTo('${cat.id}')" style="background:${cat.bg};border-color:${cat.border};">
                <div class="grid-tool-icon" style="background:${cat.bg};font-size:1.8rem;">${cat.icon}</div>
                <div class="grid-tool-body">
                    <div class="grid-tool-name" style="font-size:1rem;">${cat.name}</div>
                    <div class="grid-tool-desc">${cat.desc}</div>
                    <div class="grid-tool-tag">${tagHtml('doc', getToolCount(cat.id)+' ツール')}</div>
                </div>
            </div>`).join('')}
        </div>
    </div>`;
}

/* ===== お知らせページ ===== */
function renderNewsPage() {
    return `<div class="fade-up"><div class="news-list">
        ${NEWS.map(n => `
        <div class="news-list-item">
            <div class="news-list-body">
                <div class="news-list-title">${n.title}</div>
                <div class="news-list-desc">${n.body}</div>
            </div>
            <div class="news-list-meta">
                <span class="news-type-badge ${newsTypeCls(n.type)}">${n.typeLabel}</span>
                <span class="news-list-date">${n.date}</span>
            </div>
        </div>`).join('')}
    </div></div>`;
}

/* ===== カテゴリページ ===== */
function renderCategoryPage(catId) {
    const tools = getToolsByCategory(catId);
    if (!tools.length) return `<div style="text-align:center;padding:80px 20px;color:var(--text-muted);">
        <div style="font-size:3rem;margin-bottom:12px;">🔍</div><p>該当するツールがありません</p></div>`;
    const groups = {};
    tools.forEach(t => { if (!groups[t.category]) groups[t.category]=[]; groups[t.category].push(t); });
    return `<div class="fade-up">` +
        Object.entries(groups).map(([sub, list]) => {
            const item = getAllNavItems().find(i => i.id===sub);
            const label = item ? `${item.icon} ${item.name}` : sub;
            return `<div class="tool-grid-section">
                <div class="section-row">
                    <div class="section-h">${label} <span class="section-count">${list.length} 件</span></div>
                </div>
                <div class="tool-grid-2col">
                    ${list.map(t => `
                    <div class="grid-tool-card" onclick="openModal('${t.id}')">
                        <div class="grid-tool-icon" style="background:${t.iconBg};">${t.icon}</div>
                        <div class="grid-tool-body">
                            <div class="grid-tool-name">${t.name}</div>
                            <div class="grid-tool-desc">${t.desc}</div>
                            <div class="grid-tool-tag">${tagHtml(t.tag,t.tagName)}</div>
                        </div>
                    </div>`).join('')}
                </div>
            </div>`;
        }).join('') + `</div>`;
}

/* ===== シェルフカード ===== */
function shelfCard(t) {
    return `<div class="shelf-tool-card" onclick="openModal('${t.id}')">
        <div class="shelf-tool-icon" style="background:${t.iconBg};">${t.icon}</div>
        <div class="shelf-tool-name">${t.name}</div>
        <div class="shelf-tool-desc">${t.desc.slice(0,50)}…</div>
        <div class="shelf-tool-footer">${tagHtml(t.tag,t.tagName)}<div class="open-btn">→</div></div>
    </div>`;
}

/* ===== モーダル ===== */
function openModal(toolId) {
    const t = TOOLS.find(t => t.id===toolId);
    if (!t) return;
    const item = getAllNavItems().find(i => i.id===t.category);
    document.getElementById('modalCategory').textContent = item ? `${item.icon} ${item.name}` : '';
    document.getElementById('modalIcon').style.background = t.iconBg;
    document.getElementById('modalIcon').textContent = t.icon;
    document.getElementById('modalName').textContent = t.name;
    document.getElementById('modalDesc').textContent = t.desc;
    const btn = document.getElementById('modalBtn');
    btn.href = t.url && t.url!=='#' ? t.url : '#';
    btn.textContent = t.url && t.url!=='#' ? '▶ ツールを開く' : '🔒 近日公開予定';
    btn.className = t.url && t.url!=='#' ? 'modal-open-btn' : 'modal-open-btn disabled';
    document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

/* ===== 検索 ===== */
function handleSearch(q) {
    if (!q.trim()) { renderPage(); return; }
    const results = TOOLS.filter(t =>
        t.name.toLowerCase().includes(q.toLowerCase()) || t.desc.toLowerCase().includes(q.toLowerCase())
    );
    document.getElementById('mainHeaderTitle').textContent = `🔍 "${q}"`;
    document.getElementById('pageContent').innerHTML = results.length
        ? `<div class="fade-up"><div class="tool-grid-2col">
            ${results.map(t => `
            <div class="grid-tool-card" onclick="openModal('${t.id}')">
                <div class="grid-tool-icon" style="background:${t.iconBg};">${t.icon}</div>
                <div class="grid-tool-body">
                    <div class="grid-tool-name">${t.name}</div>
                    <div class="grid-tool-desc">${t.desc}</div>
                    <div class="grid-tool-tag">${tagHtml(t.tag,t.tagName)}</div>
                </div>
            </div>`).join('')}
           </div></div>`
        : `<div style="text-align:center;padding:80px 20px;color:var(--text-muted);">
            <div style="font-size:3rem;margin-bottom:12px;">🔍</div><p>該当なし</p></div>`;
}

/* ===== 初期化 ===== */
document.addEventListener('DOMContentLoaded', () => {
    buildTicker();
    buildSidebar();
    renderPage();
    document.getElementById('sideSearch').addEventListener('input', e => handleSearch(e.target.value));
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
    document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
});
</script>
</body>
</html>
